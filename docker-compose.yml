version: "3.8"

services:
  tor:
    image: dperson/torproxy
    container_name: satoshi-scraper-tor
    restart: unless-stopped

  satoshi-scraper:
    build: .
    container_name: satoshi-scraper
    restart: unless-stopped
    depends_on:
      - tor
    ports:
      - "9119:9119"
    environment:
      - PORT=9119
      - NODE_ENV=production
      - BTC_RPC_ONION=${BTC_RPC_ONION:-}
      - BTC_RPC_PORT=${BTC_RPC_PORT:-9332}
      - BTC_RPC_USER=${BTC_RPC_USER:-}
      - BTC_RPC_PASS=${BTC_RPC_PASS:-}
      - TOR_SOCKS_HOST=${TOR_SOCKS_HOST:-tor}
      - TOR_SOCKS_PORT=${TOR_SOCKS_PORT:-9050}
      - BTC_RPC_POLL_INTERVAL_MS=${BTC_RPC_POLL_INTERVAL_MS:-5000}
      - BTC_RPC_TIMEOUT_MS=${BTC_RPC_TIMEOUT_MS:-4000}
      - MEMPOOL_SPACE_WS_URL=${MEMPOOL_SPACE_WS_URL:-wss://mempool.space/api/v1/ws}
      - MEMPOOL_SPACE_RECONNECT_MS=${MEMPOOL_SPACE_RECONNECT_MS:-1000}
      - MEMPOOL_KNOTS_HTTP_BASE=${MEMPOOL_KNOTS_HTTP_BASE:-https://knotapi.zatobox.io}
      - MEMPOOL_KNOTS_HTTP_POLL_INTERVAL_MS=${MEMPOOL_KNOTS_HTTP_POLL_INTERVAL_MS:-1000}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9119/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    volumes:
      - ./cache:/app/cache
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

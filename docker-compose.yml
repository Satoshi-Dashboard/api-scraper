services:
  satoshi-scraper:
    build: .
    container_name: satoshi-scraper
    restart: unless-stopped
    ports:
      - "9119:9119"
    environment:
      - PORT=9119
      - NODE_ENV=production
      - FRED_API_KEY=${FRED_API_KEY}
      - MEMPOOL_SPACE_WS_URL=${MEMPOOL_SPACE_WS_URL:-wss://mempool.space/api/v1/ws}
      - MEMPOOL_SPACE_RECONNECT_MS=${MEMPOOL_SPACE_RECONNECT_MS:-1000}
      - MEMPOOL_SPACE_STALE_MS=${MEMPOOL_SPACE_STALE_MS:-30000}
      - MEMPOOL_KNOTS_HTTP_BASE=${MEMPOOL_KNOTS_HTTP_BASE:-https://upstream.example.com}
      - MEMPOOL_KNOTS_HTTP_POLL_INTERVAL_MS=${MEMPOOL_KNOTS_HTTP_POLL_INTERVAL_MS:-1000}
      - HTTPS_REDIRECT_HOST=${HTTPS_REDIRECT_HOST:-api.example.com}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://example.com,https://www.example.com}
      - SCRAPE_REFRESH_TOKEN=${SCRAPE_REFRESH_TOKEN:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9119/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    volumes:
      - ./cache:/app/cache
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

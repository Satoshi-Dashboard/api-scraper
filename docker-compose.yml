services:
  satoshi-scraper:
    build: .
    container_name: satoshi-scraper
    restart: unless-stopped
    ports:
      - "9119:9119"
    environment:
      - PORT=9119
      - NODE_ENV=production
      - FRED_API_KEY=${FRED_API_KEY}
      - MEMPOOL_SPACE_WS_URL=${MEMPOOL_SPACE_WS_URL:-wss://mempool.space/api/v1/ws}
      - MEMPOOL_SPACE_RECONNECT_MS=${MEMPOOL_SPACE_RECONNECT_MS:-1000}
      - MEMPOOL_SPACE_STALE_MS=${MEMPOOL_SPACE_STALE_MS:-30000}
      - MEMPOOL_SPACE_MEMPOOL_POLL_INTERVAL_MS=${MEMPOOL_SPACE_MEMPOOL_POLL_INTERVAL_MS:-5000}
      - MEMPOOL_KNOTS_HTTP_BASE=${MEMPOOL_KNOTS_HTTP_BASE:-https://upstream.example.com}
      - MEMPOOL_KNOTS_HTTP_POLL_INTERVAL_MS=${MEMPOOL_KNOTS_HTTP_POLL_INTERVAL_MS:-1000}
      - JOHOE_BASE_URL=${JOHOE_BASE_URL:-https://johoe.jochen-hoenicke.de/queue/2}
      - JOHOE_NETWORK=${JOHOE_NETWORK:-btc}
      - JOHOE_24H_SYNC_INTERVAL_MS=${JOHOE_24H_SYNC_INTERVAL_MS:-60000}
      - JOHOE_30D_SYNC_INTERVAL_MS=${JOHOE_30D_SYNC_INTERVAL_MS:-900000}
      - JOHOE_ALL_SYNC_INTERVAL_MS=${JOHOE_ALL_SYNC_INTERVAL_MS:-21600000}
      - JOHOE_DEFAULT_RANGE=${JOHOE_DEFAULT_RANGE:-24h}
      - JOHOE_STALE_MS=${JOHOE_STALE_MS:-180000}
      - JOHOE_QUERY_LIMIT_MAX=${JOHOE_QUERY_LIMIT_MAX:-5000}
      - JOHOE_DB_ENABLED=${JOHOE_DB_ENABLED:-true}
      - JOHOE_DB_SSL=${JOHOE_DB_SSL:-true}
      - JOHOE_DB_SSL_INSECURE_SKIP_VERIFY=${JOHOE_DB_SSL_INSECURE_SKIP_VERIFY:-false}
      - DATABASE_URL=${DATABASE_URL:-}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY:-}
      - JOHOE_FORWARD_ENABLED=${JOHOE_FORWARD_ENABLED:-false}
      - JOHOE_FORWARD_URL=${JOHOE_FORWARD_URL:-}
      - JOHOE_FORWARD_TOKEN=${JOHOE_FORWARD_TOKEN:-}
      - JOHOE_FORWARD_BATCH_SIZE=${JOHOE_FORWARD_BATCH_SIZE:-10}
      - JOHOE_FORWARD_INTERVAL_MS=${JOHOE_FORWARD_INTERVAL_MS:-15000}
      - JOHOE_FORWARD_TIMEOUT_MS=${JOHOE_FORWARD_TIMEOUT_MS:-10000}
      - HTTPS_REDIRECT_HOST=${HTTPS_REDIRECT_HOST:-api.example.com}
      - TRUST_PROXY=${TRUST_PROXY:-loopback, linklocal, uniquelocal}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://example.com,https://www.example.com}
      - SCRAPE_REFRESH_TOKEN=${SCRAPE_REFRESH_TOKEN:-}
      - REFRESH_MIN_INTERVAL_MS=${REFRESH_MIN_INTERVAL_MS:-60000}
      - FRED_MAX_LIMIT=${FRED_MAX_LIMIT:-1000}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:9119/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    volumes:
      - ./cache:/app/cache
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
